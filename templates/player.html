<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ player.name }} - CQPL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #020510; color: #f0f0f5; }
        .header { background: linear-gradient(180deg, rgba(10,20,50,0.95), rgba(5,10,30,0.95)); padding: 30px; text-align: center; border-bottom: 2px solid rgba(240,185,11,0.3); }
        .header .avatar { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #1a56ff, #6b8cff); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; }
        .header h1 { font-size: 24px; font-weight: 800; }
        .header .team-name { color: #7e8299; font-size: 14px; margin-top: 5px; }
        .header a { color: #1a56ff; text-decoration: none; font-size: 13px; font-weight: 600; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: rgba(12,16,30,0.85); border-radius: 14px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.04); }
        .stat-box .val { font-size: 36px; font-weight: 900; }
        .stat-box .lbl { font-size: 10px; color: #7e8299; font-weight: 600; letter-spacing: 1px; margin-top: 4px; }
        .goals .val { color: #f0b90b; } .assists .val { color: #1a56ff; }
        .yellow .val { color: #f0b90b; } .red .val { color: #ff2d55; }
        
        .card { background: rgba(12,16,30,0.85); border-radius: 16px; border: 1px solid rgba(255,255,255,0.04); padding: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .info-row:last-child { border-bottom: none; }
        .info-lbl { color: #7e8299; font-size: 13px; }
        .info-val { font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar">{{ player.name[0] }}</div>
        <h1>{{ player.name }}</h1>
        <div class="team-name">{{ team.name }}</div>
        <a href="/team/{{ team.id }}">← {{ team.name }} составы</a>
    </div>
    <div class="container">
        <div class="stats-grid">
            <div class="stat-box goals"><div class="val">{{ player.goals }}</div><div class="lbl">⚽ Голдар</div></div>
            <div class="stat-box assists"><div class="val">{{ player.assists }}</div><div class="lbl">🎯 Ассисттер</div></div>
            <div class="stat-box yellow"><div class="val">{{ player.yellow_cards }}</div><div class="lbl">🟡 Сары</div></div>
            <div class="stat-box red"><div class="val">{{ player.red_cards }}</div><div class="lbl">🔴 Қызыл</div></div>
        </div>
        
        <div class="card">
            <div class="info-row"><span class="info-lbl">Нөмірі</span><span class="info-val">{{ player.number }}</span></div>
            <div class="info-row"><span class="info-lbl">Позициясы</span><span class="info-val">{{ player.position }}</span></div>
            <div class="info-row"><span class="info-lbl">Команда</span><span class="info-val"><a href="/team/{{ team.id }}" style="color:#1a56ff;text-decoration:none;">{{ team.name }}</a></span></div>
        </div>
    </div>
</body>
</html>
